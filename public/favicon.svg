<svg viewBox="68.13352 58.61352 145.04 163.51999999999998" xmlns="http://www.w3.org/2000/svg" style="max-height: 500px" width="145.04" height="163.51999999999998">
  <defs>
    
    <linearGradient y2="100%" x2="100%" y1="0%" x1="0%" id="leftWall">
      <stop stop-color="#1E293B" offset="0%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-1e293b, #18212f);"/>
      <stop stop-color="#0F172A" offset="100%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-0f172a, #0c1222);"/>
    </linearGradient>
    
    <linearGradient y2="100%" x2="0%" y1="0%" x1="0%" id="rightWall">
      <stop stop-color="#334155" offset="0%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-334155, #293444);"/>
      <stop stop-color="#0F172A" offset="100%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-0f172a, #0c1222);"/>
    </linearGradient>

    <linearGradient y2="0%" x2="100%" y1="0%" x1="0%" id="floorGrad">
      <stop stop-color="#0B1120" offset="0%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-0b1120, #090e1a);"/>
      <stop stop-color="#1E293B" offset="50%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-1e293b, #18212f);"/>
      <stop stop-color="#0B1120" offset="100%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-0b1120, #090e1a);"/>
    </linearGradient>

    
    <linearGradient y2="100%" x2="100%" y1="0%" x1="0%" id="lineGrad">
      <stop stop-color="#00F0FF" offset="0%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-00f0ff, #00c0cc);"/>
      <stop stop-color="#A855F7" offset="50%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-a855f7, #510797);"/>
      <stop stop-color="#EC4899" offset="100%" data-darkreader-inline-stopcolor="" style="--darkreader-inline-stopcolor: var(--darkreader-background-ec4899, #9c1055);"/>
    </linearGradient>

    
    <filter height="200%" width="200%" y="-50%" x="-50%" id="glow">
      <feGaussianBlur result="blur" stdDeviation="6"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    
    <filter height="200%" width="200%" y="-50%" x="-50%" id="auraGlow">
      <feGaussianBlur result="blur" stdDeviation="25"/>
    </filter>
  </defs>

  
  <g transform="translate(0, 10)">
    
    
    <circle filter="url(#auraGlow)" opacity="0.15" fill="#A855F7" r="70" cy="130" cx="140" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-background-a855f7, #510797);"/>

    
    <g>
      
      <polygon stroke-linejoin="round" stroke-width="1" stroke="#334155" fill="url(#leftWall)" points="140,50 70,90 70,170 140,130" data-darkreader-inline-stroke="" style="--darkreader-inline-stroke: var(--darkreader-text-334155, #acbdcd);"/>
      
      
      <polygon stroke-linejoin="round" stroke-width="1" stroke="#475569" fill="url(#rightWall)" points="140,50 210,90 210,170 140,130" data-darkreader-inline-stroke="" style="--darkreader-inline-stroke: var(--darkreader-text-475569, #b0aa9f);"/>
      
      
      <polygon stroke-linejoin="round" stroke-width="1" stroke="#1E293B" fill="url(#floorGrad)" points="140,130 70,170 140,210 210,170" data-darkreader-inline-stroke="" style="--darkreader-inline-stroke: var(--darkreader-text-1e293b, #ccc7c1);"/>

      
      <path stroke-dasharray="4 4" stroke-width="1" stroke-opacity="0.4" stroke="#475569" d="M 105,150 L 175,190 M 175,150 L 105,190" data-darkreader-inline-stroke="" style="--darkreader-inline-stroke: var(--darkreader-text-475569, #b0aa9f);"/>
      <path stroke-width="1" stroke-opacity="0.2" stroke="#475569" d="M 140,130 L 140,210 M 70,170 L 210,170" data-darkreader-inline-stroke="" style="--darkreader-inline-stroke: var(--darkreader-text-475569, #b0aa9f);"/>

      
      <g fill="none" stroke-linecap="round" stroke-width="2.5" stroke="url(#lineGrad)">
        
        <path d="M 100,115 L 140,165"/>
        
        <path d="M 140,165 L 180,125"/>
        
        <path d="M 100,115 L 140,90"/>
        
        <path d="M 180,125 L 140,90"/>
        
        <path opacity="0.7" stroke-dasharray="4 4" d="M 140,165 L 140,90"/>
      </g>

      
      
      
      <circle filter="url(#glow)" fill="#00F0FF" r="5" cy="115" cx="100" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-00f0ff, #1af2ff);"/>
      <circle fill="#FFFFFF" r="2.5" cy="115" cx="100" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-ffffff, #e8e6e3);"/>

      
      <circle filter="url(#glow)" fill="#A855F7" r="5.5" cy="165" cx="140" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-a855f7, #a957f7);"/>
      <circle fill="#FFFFFF" r="3" cy="165" cx="140" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-ffffff, #e8e6e3);"/>

      
      <circle filter="url(#glow)" fill="#EC4899" r="5" cy="125" cx="180" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-ec4899, #ed519e);"/>
      <circle fill="#FFFFFF" r="2.5" cy="125" cx="180" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-ffffff, #e8e6e3);"/>

      
      <circle filter="url(#glow)" fill="#00F0FF" r="6" cy="90" cx="140" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-00f0ff, #1af2ff);"/>
      <circle fill="#FFFFFF" r="3" cy="90" cx="140" data-darkreader-inline-fill="" style="--darkreader-inline-fill: var(--darkreader-text-ffffff, #e8e6e3);"/>
    </g>
  </g>
</svg>